services:
  database:
    image: postgres:15-alpine
    container_name: jobsnipe_database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
  api:
    build: ./fastapi_app
    container_name: jobsnipe_api
    ports: 
      - "8000:8000"
    env_file:
      - ".env"
    depends_on:
      - "database"
    volumes:
      - .:/app

volumes:
  postgres_data: 
    